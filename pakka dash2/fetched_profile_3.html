<script>
function calc(){

    let totalAttr = 0;
    let totalTech = 0;
    let valid = true;

    document.querySelectorAll('.data-row').forEach(r=>{
        r.classList.remove('error-row');
    });

    document.querySelectorAll('.attr-weight').forEach(attr => {

        let row = attr.dataset.row;
        let attrVal = parseFloat(attr.value) || 0;

        totalAttr += attrVal;

        let techSum = 0;

        document.querySelectorAll(`.tech-weight[data-row='${row}']`)
        .forEach(t=>{
            let v = parseFloat(t.value) || 0;
            techSum += v;
            totalTech += v;
        });

        if(techSum !== attrVal || attrVal === 0){
            valid = false;

            document.querySelectorAll(`.data-row[data-row='${row}']`)
            .forEach(r=> r.style.background = "#ffe6e6");
        }
    });

    document.getElementById('totalAttr').innerText = totalAttr;
    document.getElementById('totalTech').innerText = totalTech;

    if(totalAttr !== 100 || totalTech !== 100){
        valid = false;
    }

    document.getElementById('saveBtn').disabled = !valid;
}
